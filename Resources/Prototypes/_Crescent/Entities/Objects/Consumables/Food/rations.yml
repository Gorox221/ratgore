#All the Hullrot ration packs
- type: entity
  parent: BaseStorageItem
  id: DsmRationPack
  name: Imperial Army Ration Package
  description: A standard, ready to eat, ration pack utilized by the Imperial Army. These contain one meal worth of food, and have an essentially infinite shelf life. 
  components:
  - type: Tag
    tags:
    - DsmRation
  - type: Sprite
    sprite: _Crescent/Objects/Consumables/Food/ration.rsi
    state: dsmrationclosed
  - type: Item
    size: Small
  - type: Storage
    grid:
    - 0,0,2,1
    maxItemSize: Small
  - type: StorageFill
    contents:
    - id: RationComponentMainSoyBeef
      orGroup: main
    - id: RationComponentMainMothroach
      orGroup: main
    - id: RationComponentMainPilaf
      orGroup: main
    - id: RationComponentMainTofu
      orGroup: main
    - id: RationComponentMainEggs
      orGroup: main
    - id: RationComponentMainBeans
      orGroup: main
    - id: RationComponentSideBrickWater
      orGroup: side
    - id: RationComponentSideBrickChocolate
      orGroup: side
    - id: RationComponentSideBrickCoffee
      orGroup: side
    - id: RationComponentSideBrickCranberry
      orGroup: side2
    - id: RationComponentSideBrickApple
      orGroup: side2
    - id: RationComponentSideBrickVanilla
      orGroup: side2