- type: entity
  parent: BaseLathe
  id: AdditiveWorkshop
  name: Matter Printer
  description: An industrial additive manufacturing unit capable of printing magazines, tools, and other small equipment.
  components:
  - type: Sprite
    sprite: _Crescent/Structures/Industry/additiveworkshop.rsi
    layers:
    - state: printerinactive
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: MaterialStorageMagnetPickup
    magnetEnabled: True
  - type: MaterialStorage
    dropOnDeconstruct: true
    ignoreColor: true
    canEjectStoredMaterials: true
    whitelist:
      tags:
      - Ingot
      - RawMaterial
      - Sheet
  - type: Lathe
    idleState: printerinactive
    runningState: printeractive
    staticRecipes:
    - LightRifleMag
    - LightRifleBox
    - RifleMag
    - RifleDrum
    - MagazinePistolSubMachineGunEmpty
    - MagazinePistolSubMachineGunHeavyEmpty
    - MagazineShotgunEmpty
    - MagazinePistolEmpty
    - MagazinePistolSubMachineGunTopMountedEmpty
    - MagazineMagnumEmpty
    - MagazinePistol6mmSmgEmpty
    - MagazineRiflePanEmpty
    - MagazineHeavyRifleEmpty
    - MagazineHeavyRifleBoxmagEmpty
    - MagazineMagnumSubEmpty
    - MagazineAntiMaterielEmpty
    - BaseMagazineCaselessRifleEmpty
    - SpeedLoaderMagnumEmpty
    - MagazineRocketEmpty

- type: entity
  parent: BaseLathe
  id: EnergeticsMill
  name: Powder ball mill
  description: A heavy rotating drum used to grind and incorporate energetic materials into usable propellant.
  components:
  - type: Sprite
    sprite: _Crescent/Structures/Industry/energeticsmill.rsi
    layers:
    - state: energeticmillinactive
      map: ["enum.LatheVisualLayers.IsRunning"]
  - type: MaterialStorageMagnetPickup
    magnetEnabled: True
  - type: MaterialStorage
    dropOnDeconstruct: false
    ignoreColor: true
    canEjectStoredMaterials: true
    whitelist:
      tags:
      - RawMaterial
      - Sheet
  - type: Lathe
    idleState: energeticmillinactive
    runningState: energeticmillactive
    staticRecipes:
    - BlackpowderCraft
    - OrdnanceCompoundCraft

- type: entity
  parent: BaseLathe
  id: AlloySmelter
  name: Industrial Induction Furnace
  description: an electrically powered machine that uses electromagnetic induction to generate intense, rapid heat directly within conductive materials, melting them without direct contact.
  components:
